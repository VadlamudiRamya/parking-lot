databases:
  - name: parking-lot-db
    plan: free
    databaseName: parking_db
    user: parking_user

services:
  - type: web
    name: parking-lot
    runtime: node
    plan: free
    region: oregon
    branch: main
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: parking-lot-db
          property: connectionString
      - key: NODE_ENV
        value: production
